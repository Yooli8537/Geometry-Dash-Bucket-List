<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/level.css">
    <link rel="stylesheet" href="../css/traits.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <title id="levelTitle">Windy Landscape</title>
</head>

<body>
    <div class="titleBox">
        <p class="gd">Geometry Dash</p>
        <p class="title">Bucket List Details</p>
    </div>
    <h3>Viewing Level</h3>
    <a href="../index.html"><button class="navButton" type="button">Home</button></a>
    <button class="navButton" type="button">Edit</button>
    <hr>

    <div id="bg">
        <div id="statusHeader" class="complete">
            <div class="box">
                <div class="levelPageTitle">
                    <p id="levelPlacement">#10000</p>
                    <p id="levelName">Windy Landscape</p>
                </div>
            </div>
        </div>

        <div class="pageLayout">
            <div class="cosmeticColumn">
                <p class="levelDetail" id="startingDate">Starting Date: </p>
                <p class="levelDetail" id="endingDate">Ending Date: </p>
                <p class="levelDetail" id="enjoyment">Enjoyment: </p>
                <p class="levelDetail" id="song">Song: </p>
                <p class="levelDetail" id="songId">Song ID: </p>
            </div>
            <div class="progressColumn">
                <p class="levelDetail" id="placement">Placement: </p>
                <p class="levelDetail" id="reason">Reason: </p>
                <p class="levelDetail" id="attempts">Attempts: </p>
                <p class="levelDetail" id="startposAttempts">Startpos Attempts: </p>
            </div>
            <div class="infoColumn">
                <p class="levelDetail" id="subcategory">Subcategory: </p>
                <div class="trait">TestTrait</div>
            </div>
        </div>
    </div>
</body>

</html>
