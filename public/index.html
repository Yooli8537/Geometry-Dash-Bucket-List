<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/table.css">
    <link rel="stylesheet" href="css/traits.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="js/loadLevels.js" defer></script>
    <title>GD Bucket List</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
    <div class="titleBox">
        <p class="gd">Geometry Dash</p>
        <p class="title">Bucket List</p>
    </div>
    <h3>Road to Heliopolis & Death Corridor v2</h3>
    <a href="pages/add.html">add.html</a>
    <hr>

    <table>
        <thead>
            <tr>
                <th id="numColumn">#</th>
                <th id="nameColumn">Name</th>
                <th id="placementColumn">AREDL</th>
                <th id="bestColumn">Best</th>
                <th id="attemptsColumn">Total Attempts</th>
                <th id="traitsColumn">Traits</th>
                <th id="reasonColumn">Placement Reason</th>
            </tr>
        </thead>
        <tbody id="insaneDemons">
            <tr>
                <td class="divider" id="insaneDivider" colspan="6">Insane Demons</td>
            </tr>
        </tbody>
        <tbody id="firstExtremes">
            <tr>
                <td class="divider" id="firstDivider" colspan="6">First Extremes</td>
            </tr>
        </tbody>
        <tbody id="beginnerExtremes">
            <tr>
                <td class="divider" id="beginnerDivider" colspan="6">Beginner Extremes</td>
            </tr>
        </tbody>
        <tbody id="advancedExtremes">
            <tr>
                <td class="divider" id="advancedDivider" colspan="6">Advanced Extremes</td>
            </tr>
        </tbody>
        <tbody id="listExtremes">
            <tr>
                <td class="divider" id="listDivider" colspan="6">List Extremes</td>
            </tr>
        </tbody>
        <tbody id="goalExtremes">
            <tr>
                <td class="divider" id="finalDivider" colspan="6">Final Goals</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
